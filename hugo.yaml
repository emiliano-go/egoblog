baseURL: "https://blog.emiliano-go.com/"
locale: "en-US"
title: "Emiliano G.O."
theme: "PaperMod"

pagination:
  pagerSize: 10

enableRobotsTXT: true

sitemap:
  changefreq: monthly
  priority: 0.5
  filename: sitemap.xml

buildDrafts: false
buildFuture: false
buildExpired: false

minify:
  disableXML: true
  minifyOutput: true

params:
  env: production
  title: "Dev Blog"

  assets:
    favicon: "/favicon.svg"
    favicon16x16: "/favicon-16x16.png"
    favicon32x32: "/favicon-32x32.png"
  description: "My Personal blog where I write about whatever I'm learning/working rn."
  author: "Emiliano G.O."
  mainSections:
    - studies
    - works

  defaultTheme: dark
  disableThemeToggle: false

  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: true
  ShowToc: true

  homeInfoParams:
    Title: "Welcome to my Dev Blog"
    Content: >
      Thoughts, notes, and writing about whatever I'm learning/working rn.

  socialIcons:
    - name: github
      url: "https://github.com/emiliano-gandini-outeda"
    - name: linkedin
      url: "https://linkedin.com/in/emiliano-gandini-outeda"

menu:
  main:
    - identifier: LibreCourseUY
      name: LibreCourseUY
      url: /librecourseuy/
      weight: 10

    - identifier: Studies
      name: Studies
      url: /studies/
      weight: 20

    - identifier: Works
      name: Works
      url: /works/
      weight: 30

mediaTypes:
  text/plain:
    suffixes:
      - txt

outputFormats:
  LLMS:
    mediaType: text/plain
    baseName: llms
    isPlainText: true

outputs:
  home:
    - HTML
    - RSS
    - JSON
    - LLMS

markup:
  goldmark:
    renderer:
      unsafe: true

  highlight:
    noClasses: false
